name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (CPU-only)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── Swift ────────────────────────────────────────────────
      - name: Build Swift package
        run: swift build

      - name: Run Swift tests (CPU-only, skip Metal test classes)
        run: |
          swift test \
            --skip MetalSTFTTests \
            --skip MetalMatmulTests \
            --skip MetalElementwiseTests \
            --skip MetalReductionTests \
            --skip MetalConvolutionTests \
            --skip MetalBackendTests \
            --skip GPUParityTests \
            --skip ThresholdCalibrationTests

      # ── Dylib ────────────────────────────────────────────────
      - name: Build dylib
        run: ./scripts/build_dylib.sh

      # ── Python ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -e ".[dev,display,eval]"

      - name: Run Python tests
        run: pytest Tests/ -v --tb=short --ignore=Tests/test_model_parity.py

  build-and-test-ios:
    name: Build & Test (iOS Simulator)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme MetalMomCore \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Build static bridge for iOS Simulator
        run: |
          xcodebuild build \
            -scheme MetalMomBridgeStatic \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Run Swift tests (iOS Simulator, skip Metal/GPU classes)
        run: |
          xcodebuild test \
            -scheme MetalMom-Package \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -skipPackagePluginValidation \
            -skip-testing:MetalMomTests/MetalSTFTTests \
            -skip-testing:MetalMomTests/MetalMatmulTests \
            -skip-testing:MetalMomTests/MetalElementwiseTests \
            -skip-testing:MetalMomTests/MetalReductionTests \
            -skip-testing:MetalMomTests/MetalConvolutionTests \
            -skip-testing:MetalMomTests/MetalBackendTests \
            -skip-testing:MetalMomTests/GPUParityTests \
            -skip-testing:MetalMomTests/ThresholdCalibrationTests \
            -skip-testing:MetalMomTests/MetalSmokeTests
